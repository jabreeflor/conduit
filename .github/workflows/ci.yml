name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make lint

      - name: Type-check
        run: make typecheck

      - name: Unit tests
        run: make test

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: make release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conduit-release-binaries
          path: dist/
