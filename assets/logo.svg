<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Conduit icon — Channel Bracket">
  <title>Conduit — Channel Bracket</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#0e1320"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg2)"/>

  <!-- Left bracket [ -->
  <path d="M 184 128
           L 128 128
           L 128 384
           L 184 384"
        fill="none"
        stroke="#f5f5f4"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Right bracket ] -->
  <path d="M 328 128
           L 384 128
           L 384 384
           L 328 384"
        fill="none"
        stroke="#f5f5f4"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Cursor / chevron in the channel -->
  <path d="M 220 192
           L 296 256
           L 220 320"
        fill="none"
        stroke="url(#grad2)"
        stroke-width="40"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Signal dot trailing the cursor -->
  <circle cx="178" cy="256" r="10" fill="#fbbf24" opacity="0.6"/>
  <circle cx="156" cy="256" r="6" fill="#fbbf24" opacity="0.3"/>
</svg>
