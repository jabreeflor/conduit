<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Conduit — Your AI-powered local-first platform">
  <title>Conduit</title>
  <desc>Conduit hero banner — dark theme with the wordmark Conduit, an animated signal flowing through a stylized channel, and the tagline "Your AI-powered local-first platform".</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="60%" stop-color="#0e1320"/>
      <stop offset="100%" stop-color="#161226"/>
    </linearGradient>

    <!-- Subtle radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Signal gradient — warm amber to copper -->
    <linearGradient id="signalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Conduit wordmark gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>

    <!-- Pulse animation -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot pattern for grid texture -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1f2937" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- Channel/conduit pipe (left) -->
  <g opacity="0.85">
    <rect x="60" y="180" width="180" height="40" rx="20" fill="none" stroke="#27272a" stroke-width="2"/>
    <rect x="60" y="180" width="180" height="40" rx="20" fill="#0f172a" opacity="0.6"/>
  </g>

  <!-- Channel/conduit pipe (right) -->
  <g opacity="0.85">
    <rect x="960" y="180" width="180" height="40" rx="20" fill="none" stroke="#27272a" stroke-width="2"/>
    <rect x="960" y="180" width="180" height="40" rx="20" fill="#0f172a" opacity="0.6"/>
  </g>

  <!-- Signal flow line — left to right -->
  <g filter="url(#softGlow)">
    <path d="M 60 200 L 1140 200" stroke="url(#signalGrad)" stroke-width="2" opacity="0.5" fill="none"/>
  </g>

  <!-- Animated signal pulses -->
  <g filter="url(#softGlow)">
    <circle r="6" fill="#fbbf24">
      <animateMotion dur="3s" repeatCount="indefinite" path="M 60 200 L 1140 200"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#f59e0b">
      <animateMotion dur="3s" begin="1s" repeatCount="indefinite" path="M 60 200 L 1140 200"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#b45309">
      <animateMotion dur="3s" begin="2s" repeatCount="indefinite" path="M 60 200 L 1140 200"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Endpoint nodes -->
  <g>
    <circle cx="150" cy="200" r="12" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="150" cy="200" r="4" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="200" r="12" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="1050" cy="200" r="4" fill="#fbbf24">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark: Conduit -->
  <g>
    <text x="600" y="180" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif"
          font-size="120" font-weight="700" letter-spacing="-4"
          fill="url(#textGrad)">Conduit</text>

    <!-- Tagline -->
    <text x="600" y="240" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Mono', 'JetBrains Mono', ui-monospace, monospace"
          font-size="18" font-weight="400" letter-spacing="2"
          fill="#a8a29e">YOUR AI-POWERED LOCAL-FIRST PLATFORM</text>

    <!-- Subtitle -->
    <text x="600" y="290" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif"
          font-size="14" font-weight="400" letter-spacing="1"
          fill="#78716c">Model-agnostic · Self-hosted · Voice + Vision · Plugin-ready</text>
  </g>

  <!-- Corner accents -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24"/>
    <path d="M 1176 24 L 1176 56 M 1176 24 L 1144 24"/>
    <path d="M 24 376 L 24 344 M 24 376 L 56 376"/>
    <path d="M 1176 376 L 1176 344 M 1176 376 L 1144 376"/>
  </g>

  <!-- Status chip top-left -->
  <g transform="translate(48, 48)">
    <rect width="180" height="28" rx="14" fill="#0f172a" stroke="#27272a" stroke-width="1"/>
    <circle cx="16" cy="14" r="4" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="18"
          font-family="-apple-system, 'SF Mono', ui-monospace, monospace"
          font-size="11" fill="#a8a29e" letter-spacing="1">conduit · ready · v1.0</text>
  </g>
</svg>
